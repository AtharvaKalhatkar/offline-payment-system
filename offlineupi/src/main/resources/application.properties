spring.application.name=offlineupi

# Server Port — Railway injects PORT automatically
server.port=${PORT:8082}
server.address=0.0.0.0

# PostgreSQL — uses Railway env vars in prod, falls back to local for dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/offline_wallet_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Atharva@3232}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect